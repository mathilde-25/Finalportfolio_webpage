<section id="booking">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="booking-square">
         <h4 class="mb-0">Book A Table</h4>
        <div class="card-body">

          <form>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First name</label>
                <input type="text" class="form-control bg-white">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Last name</label>
                <input type="text" class="form-control bg-white">
              </div>
            </div>

            <div class="row">
              <div class="col-12 md-5 mb-3">
                <label class="form-label">Number of Guests</label>
                <select class="form-select bg-white">
                  <option>Choose...</option>
                  <option>1</option>
                  <option>2</option>
                  <option>3</option>
                  <option>4</option>
                  <option>5</option>
                  <option>6+</option>
                </select>
              </div>

              <div class="col-12 md-4 mb-3">
                <label class="form-label">Date and Time</label>
                <input type="text" class="form-control bg-white" placeholder="MM/DD/YYYY HH:MM">
              </div>

              <div class="col-12 md-3 mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="text" class="form-control bg-white">
              </div>
            </div>

          <div class="d-flex justify-content-center">
            <button class="btn btn-primary w-50 " type="submit">
              Book
            </button>
          </div>

          
        </div>
      </div>
    </div>
  </div>
</div>
</section>
